<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách thiết bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <!-- Header Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>
    
    <div class="container mt-4">
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <div th:each="device : ${devices}" class="col-md-4 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${device.name}">Tên thiết bị</h5>
                        <p class="card-text" th:text="${device.description}">Mô tả</p>
                        <div class="mb-2">
                            <span class="badge bg-info">Số lượng còn: <span th:text="${device.available}">0</span></span>
                            <span class="badge bg-secondary">Tổng số: <span th:text="${device.totalQuantity}">0</span></span>
                        </div>
                        <a th:href="@{/borrow/{id}(id=${device.id})}" class="btn btn-primary">Đăng ký mượn</a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(devices)}" class="alert alert-info">
            Hiện không có thiết bị nào trong hệ thống.
        </div>
    </div>

    <!-- Footer Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
