<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa thiết bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h4 th:text="${device.id == null ? 'Thêm thiết bị mới' : 'Cập nhật thiết bị'}">
                            Thêm thiết bị mới
                        </h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/devices/save}" th:object="${device}" method="post">
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label for="name" class="form-label">Tên thiết bị</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required />
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Mô tả</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="totalQuantity" class="form-label">Số lượng tổng</label>
                                <input type="number" class="form-control" id="totalQuantity" th:field="*{totalQuantity}" min="0" required />
                            </div>

                            <div class="mb-3">
                                <label for="available" class="form-label">Số lượng có sẵn</label>
                                <input type="number" class="form-control" id="available" th:field="*{available}" min="0" required />
                            </div>

                            <div class="d-flex justify-content-between">
                                <a th:href="@{/admin/devices}" class="btn btn-secondary">Quay lại</a>
                                <button type="submit" class="btn btn-primary">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
