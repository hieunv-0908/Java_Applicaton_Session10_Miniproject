<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý thiết bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Quản lý thiết bị</h2>
            <div>
                <a th:href="@{/admin/devices/new}" class="btn btn-primary">Thêm thiết bị mới</a>
                <a th:href="@{/admin/requests}" class="btn btn-secondary">Xem yêu cầu</a>
            </div>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên thiết bị</th>
                    <th>Mô tả</th>
                    <th>Số lượng tổng</th>
                    <th>Số lượng có sẵn</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="device : ${devices}">
                    <td th:text="${device.id}">1</td>
                    <td th:text="${device.name}">Màn hình</td>
                    <td th:text="${device.description}">Màn hình LCD 24 inch</td>
                    <td th:text="${device.totalQuantity}">10</td>
                    <td th:text="${device.available}">8</td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/admin/devices/edit/{id}(id=${device.id})}" 
                               class="btn btn-primary btn-sm">Sửa</a>
                            <a th:href="@{/admin/devices/delete/{id}(id=${device.id})}" 
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Bạn có chắc muốn xóa thiết bị này?')">Xóa</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(devices)}" class="alert alert-info">
            Không có thiết bị nào trong hệ thống.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
