<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý yêu cầu mượn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách yêu cầu mượn</h2>
            <a th:href="@{/admin/devices}" class="btn btn-secondary">Quản lý thiết bị</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Mã SV</th>
                    <th>Email</th>
                    <th>Số lượng</th>
                    <th>Ngày nhận</th>
                    <th>Ngày trả</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="request : ${requests}">
                    <td th:text="${request.id}">1</td>
                    <td th:text="${request.fullName}">Nguyễn Văn A</td>
                    <td th:text="${request.studentCode}">SV001</td>
                    <td th:text="${request.email}">email@example.com</td>
                    <td th:text="${request.quantity}">1</td>
                    <td th:text="${request.borrowDate}">2024-01-01</td>
                    <td th:text="${request.returnDate}">2024-01-02</td>
                    <td>
                        <span th:if="${request.status == 'PENDING'}" class="badge bg-warning">Chờ duyệt</span>
                        <span th:if="${request.status == 'APPROVED'}" class="badge bg-success">Đã duyệt</span>
                        <span th:if="${request.status == 'REJECTED'}" class="badge bg-danger">Từ chối</span>
                    </td>
                    <td>
                        <div class="btn-group" role="group">
                            <a th:href="@{/admin/requests/approve/{id}(id=${request.id})}" 
                               class="btn btn-success btn-sm">Duyệt</a>
                            <a th:href="@{/admin/requests/reject/{id}(id=${request.id})}" 
                               class="btn btn-danger btn-sm">Từ chối</a>
                            <a th:href="@{/admin/requests/delete/{id}(id=${request.id})}" 
                               class="btn btn-outline-danger btn-sm"
                               onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(requests)}" class="alert alert-info">
            Không có yêu cầu nào trong hệ thống.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
