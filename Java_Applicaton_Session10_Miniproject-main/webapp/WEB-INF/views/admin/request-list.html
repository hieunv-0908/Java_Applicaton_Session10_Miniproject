<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách yêu cầu mượn</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-4">
    <h2 class="mb-4">Danh sách yêu cầu mượn</h2>

    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Họ tên</th>
                <th>Mã SV</th>
                <th>Email</th>
                <th>SL</th>
                <th>Ngày nhận</th>
                <th>Ngày trả</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${requests}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.fullName}"></td>
                <td th:text="${r.studentCode}"></td>
                <td th:text="${r.email}"></td>
                <td th:text="${r.quantity}"></td>
                <td th:text="${r.borrowDate}"></td>
                <td th:text="${r.returnDate}"></td>
                <td>
                    <span class="badge bg-warning text-dark" th:if="${r.status == 'PENDING'}">PENDING</span>
                    <span class="badge bg-success" th:if="${r.status == 'APPROVED'}">APPROVED</span>
                    <span class="badge bg-danger" th:if="${r.status == 'REJECTED'}">REJECTED</span>
                </td>
                <td>
                    <a class="btn btn-sm btn-success" th:href="@{/admin/requests/approve/{id}(id=${r.id})}">Duyệt</a>
                    <a class="btn btn-sm btn-danger" th:href="@{/admin/requests/reject/{id}(id=${r.id})}">Từ chối</a>
                    <a class="btn btn-sm btn-outline-danger" th:href="@{/admin/requests/delete/{id}(id=${r.id})}"
                       onclick="return confirm('Xóa yêu cầu này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
