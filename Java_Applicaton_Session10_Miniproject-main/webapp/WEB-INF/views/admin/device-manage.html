<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý thiết bị</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Quản lý thiết bị</h2>
        <a class="btn btn-primary" th:href="@{/admin/devices/new}">+ Thêm thiết bị</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Ảnh</th>
                <th>Số lượng</th>
                <th>Mô tả</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="device : ${devices}">
                <td th:text="${device.id}"></td>
                <td th:text="${device.name}"></td>
                <td>
                    <img th:src="${device.imageUrl}" alt="image" style="width: 80px; height: 60px; object-fit: cover;">
                </td>
                <td th:text="${device.available}"></td>
                <td th:text="${device.description}"></td>
                <td>
                    <a class="btn btn-sm btn-warning" th:href="@{/admin/devices/edit/{id}(id=${device.id})}">Sửa</a>
                    <a class="btn btn-sm btn-danger" th:href="@{/admin/devices/delete/{id}(id=${device.id})}"
                       onclick="return confirm('Xóa thiết bị này?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
